services:
  - type: web
    name: logistics-app
    env: node
    plan: free
    buildCommand: npm install && npm run build:prod
    startCommand: npm run start:prod
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      # Shared login password — set this in the Render dashboard to require login.
      - key: AUTH_PASSWORD
        sync: false
      # Random secret for signing session cookies. Render can generate one.
      - key: AUTH_SECRET
        generateValue: true
